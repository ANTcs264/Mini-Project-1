<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 ADAPTIVE STORYTELLER | AI-Powered Adventure</title>
 <link rel="stylesheet" href="http://localhost:8000/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated Background -->
    <div class="cyber-background">
        <div class="grid-overlay"></div>
        <div class="scan-line"></div>
        <div class="particles"></div>
    </div>

    <!-- Main Game Container -->
    <div class="game-hub">
        <!-- Header with Neon Effects -->
        <header class="game-header">
            <div class="header-glow"></div>
            <h1 class="game-title">
                <span class="title-glitch">ADAPTIVE</span>
                <span class="title-highlight">STORYTELLER</span>
            </h1>
            <div class="version-badge">v2.0 AI</div>
        </header>

        <!-- Main Game Area -->
        <div class="game-area">
            <!-- Player Stats Panel - Cyberpunk Style -->
            <div class="stats-panel">
                <div class="panel-header">
                    <h3>⚡ PLAYER PROFILE</h3>
                    <div class="header-line"></div>
                </div>
                
                <div class="player-personality">
                    <div class="personality-label">PERSONALITY TYPE</div>
                    <div class="personality-value" id="personality">UNCLASSIFIED</div>
                    <div class="personality-bar">
                        <div class="bar-fill" id="personality-confidence" style="width: 0%"></div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">⚔️</div>
                        <div class="stat-info">
                            <span class="stat-label">Fights</span>
                            <span class="stat-value" id="fights">0</span>
                        </div>
                        <div class="stat-progress">
                            <div class="progress-fill fights-bar" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon">🤝</div>
                        <div class="stat-info">
                            <span class="stat-label">Diplomatic</span>
                            <span class="stat-value" id="diplomatic">0</span>
                        </div>
                        <div class="stat-progress">
                            <div class="progress-fill diplomatic-bar" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon">👤</div>
                        <div class="stat-info">
                            <span class="stat-label">Stealth</span>
                            <span class="stat-value" id="stealth">0</span>
                        </div>
                        <div class="stat-progress">
                            <div class="progress-fill stealth-bar" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon">⚡</div>
                        <div class="stat-info">
                            <span class="stat-label">Risky</span>
                            <span class="stat-value" id="risky">0</span>
                        </div>
                        <div class="stat-progress">
                            <div class="progress-fill risky-bar" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon">🛡️</div>
                        <div class="stat-info">
                            <span class="stat-label">Cautious</span>
                            <span class="stat-value" id="cautious">0</span>
                        </div>
                        <div class="stat-progress">
                            <div class="progress-fill cautious-bar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="total-actions">
                    <span>TOTAL ACTIONS</span>
                    <span class="total-number" id="total-actions">0</span>
                </div>
            </div>

            <!-- Story Container - Main Game Display -->
            <div class="story-container">
                <div class="story-image" id="story-image">
                    <div class="image-overlay"></div>
                </div>
                
                <div class="story-content">
                    <div class="story-badge">CHAPTER IN PROGRESS</div>
                    <div class="story-text" id="story-text">
                        <span class="typing-effect">Loading your adventure...</span>
                    </div>
                </div>

                <!-- Choices Container -->
                <div class="choices-container" id="choices-container">
                    <div class="choices-header">
                        <span class="glowing-text">MAKE YOUR CHOICE</span>
                        <div class="choices-decoration"></div>
                    </div>
                    <div class="choices-grid" id="choices-grid">
                        <!-- Choices will be dynamically inserted here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Game Footer with Controls -->
        <footer class="game-footer">
            <div class="footer-left">
                <div class="game-status" id="game-status">
                    <span class="status-dot"></span>
                    READY
                </div>
            </div>
            
            <div class="footer-center">
                <button id="new-game-btn" class="cyber-button">
                    <span class="button-text">🔄 NEW GAME</span>
                    <span class="button-glitch"></span>
                </button>
            </div>
            
            <div class="footer-right">
                <div class="sound-indicator">🔊</div>
            </div>
        </footer>
    </div>

    <!-- Achievement Popup (Hidden by default) -->
    <div class="achievement-popup" id="achievement-popup">
        <div class="achievement-icon">🏆</div>
        <div class="achievement-text">
            <span class="achievement-title">Achievement Unlocked!</span>
            <span class="achievement-desc" id="achievement-desc">First Choice Made</span>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
